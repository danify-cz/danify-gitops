apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: danify

resources:
  - ../base/danify-landing
  - ../base/danify-fe
  - ../base/danify-be
  - ../base/postgresql
  - ingress.yaml
  - danify-fe-config.yaml
  - danify-api-sealed-secret.yaml
  # ghcr-secret.yaml - managed outside ArgoCD

images:
  - name: danify-landing
    newName: ghcr.io/danify-cz/danify-landing
    newTag: dev-e849066 # danify-landing
  - name: danify-fe
    newName: ghcr.io/danify-cz/danify-fe
    newTag: dev-8e2ae4f # danify-fe
  - name: danify-api
    newName: ghcr.io/danify-cz/danify-api
    newTag: dev-8e2ae4f # danify-api

patches:
  - target:
      kind: ConfigMap
      name: danify-api-config
    patch: |-
      - op: add
        path: /data/BETTER_AUTH_URL
        value: "https://api.dev.danify.cz:9443"
      - op: add
        path: /data/TRUSTED_ORIGINS
        value: "https://app.dev.danify.cz:9443"
      - op: add
        path: /data/FRONTEND_URL
        value: "https://app.dev.danify.cz:9443"
      # Higher rate limits for dev testing
      - op: replace
        path: /data/AI_RATE_LIMIT_MAX
        value: "50"
      # AI Gateway (#288) — enabled on dev for testing (key in danify-api-secret)
      - op: add
        path: /data/AI_GATEWAY_ENABLED
        value: "true"
      - op: add
        path: /data/BANK_EMAIL_DOMAIN
        value: "danify.online"
      # Email service (Resend)
      - op: add
        path: /data/EMAIL_FROM
        value: "Danify DEV <noreply@mail.danify.cz>"
      - op: add
        path: /data/EMAIL_APP_NAME
        value: "Danify DEV"
      # Dev redirect — all emails go to martin@danify.cz for testing
      - op: add
        path: /data/EMAIL_DEV_REDIRECT
        value: "martin@danify.cz"
      # Sentry — gh#190 slice 1 (BE Sentry)
      # SENTRY_DSN je v sealed secretu (danify-api-secret).
      # SENTRY_RELEASE bude dynamicky substituovan v slice 4 (deploy-dev.yml SHA).
      - op: add
        path: /data/SENTRY_ENVIRONMENT
        value: "dev"
      - op: add
        path: /data/SENTRY_RELEASE
        value: "danify-api@dev"
