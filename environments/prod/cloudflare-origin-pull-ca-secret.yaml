# Authenticated Origin Pulls CA pro danify (danify-app gh#394 #2) — ZONE-LEVEL.
#
# Náš vlastní zone-level origin-pull cert (CA, self-signed, CN=origin-pull.danify.cz,
# do 2036). nginx (auth-tls anotace na danify Ingressech) jím ověřuje klientský
# LEAF cert, který Cloudflare posílá originu (CF Zone-level AOP, Global VYPNUTO).
# Leaf cert je nahraný v CF (Zone-level → Upload certificate, CF cert ID
# f2d57605-755c-446a-9f5d-90d1a9e9bcd6) a podepsaný touto CA.
#
# CF-global sdílená CA byla z bundlu ODEBRÁNA (po přepnutí na Zone-level) →
# plná striktnost: origin přijme JEN náš řetězec, ne sdílený CF cert.
# Cert+klíč (CA i leaf) jsou v 1Password (Personal → "danify CF Origin Pull cert").
