apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: danify

resources:
  - ../base/danify-landing
  - ../base/danify-fe
  - ../base/danify-be
  - ../base/postgresql
  - ingress.yaml
  - basic-auth-secret.yaml
  - cloudflare-origin-pull-ca-secret.yaml
  - danify-fe-config.yaml
  - danify-api-sealed-secret.yaml
  # Postgres backup (gh#418) — daily pg_dump → age-encrypt → R2, prod-only
  - postgres-backup-config.yaml
  - postgres-backup-sealed-secret.yaml
  - postgres-backup-cronjob.yaml
  # ghcr-secret.yaml - managed outside ArgoCD

images:
  - name: danify-landing
    newName: ghcr.io/danify-cz/danify-landing
    newTag: "1.2.0" # danify-landing
  - name: danify-fe
    newName: ghcr.io/danify-cz/danify-fe
    newTag: "1.58.0" # danify-fe
  - name: danify-api
    newName: ghcr.io/danify-cz/danify-api
    newTag: "1.55.0" # danify-api

patches:
  - target:
      kind: Deployment
      name: danify-api
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "1536Mi"
            cpu: "1500m"
  - target:
      kind: StatefulSet
      name: postgresql
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
            cpu: "1"
  - target:
      kind: ConfigMap
      name: danify-api-config
    patch: |-
      - op: add
        path: /data/BETTER_AUTH_URL
        value: "https://api.danify.cz"
      - op: add
        path: /data/TRUSTED_ORIGINS
        value: "https://app.danify.cz"
      - op: add
        path: /data/FRONTEND_URL
        value: "https://app.danify.cz"
      # AI Gateway (#288) — enabled on prod (key in danify-api-secret)
      - op: add
        path: /data/AI_GATEWAY_ENABLED
        value: "true"
      - op: add
        path: /data/BANK_EMAIL_DOMAIN
        value: "danify.online"
      # Email service (Resend) — no dev redirect on prod, real emails to users
      - op: add
        path: /data/EMAIL_FROM
        value: "Danify <noreply@mail.danify.cz>"
      - op: add
        path: /data/EMAIL_APP_NAME
        value: "Danify"
      # Sentry — gh#190 slice 5. SENTRY_DSN je v sealed secretu (danify-api-secret).
      # SENTRY_RELEASE musi byt aktualizovan pri kazdem prod release na nove
      # bumpnutou semver verzi (deploy-prod.yml workflow bumpne package.json,
      # tady kopirujem manualne). Po prod deploy je tag napr. danify-api@1.34.0.
      - op: add
        path: /data/SENTRY_ENVIRONMENT
        value: "production"
      - op: add
        path: /data/SENTRY_RELEASE
        value: "danify-api@1.34.0"
