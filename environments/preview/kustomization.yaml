apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: danify

resources:
  - ../base/danify-landing
  - ../base/danify-fe
  - ../base/danify-be
  - ../base/postgresql
  - ingress.yaml
  - danify-fe-config.yaml
  - danify-api-sealed-secret.yaml
  # ghcr-secret.yaml - managed outside ArgoCD

images:
  - name: danify-landing
    newName: ghcr.io/danify-cz/danify-landing
    newTag: "dev-ef093d7" # danify-landing
  - name: danify-fe
    newName: ghcr.io/danify-cz/danify-fe
    newTag: "dev-7b0deb9" # danify-fe
  - name: danify-api
    newName: ghcr.io/danify-cz/danify-api
    newTag: "dev-7b0deb9" # danify-api

patches:
  - target:
      kind: Deployment
      name: danify-api
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            memory: "192Mi"
            cpu: "75m"
          limits:
            memory: "384Mi"
            cpu: "300m"
  - target:
      kind: ConfigMap
      name: danify-api-config
    patch: |-
      - op: add
        path: /data/BETTER_AUTH_URL
        value: "https://api.preview.danify.cz"
      - op: add
        path: /data/TRUSTED_ORIGINS
        value: "https://app.preview.danify.cz"
      - op: add
        path: /data/FRONTEND_URL
        value: "https://app.preview.danify.cz"
      # Higher rate limits for preview testing
      - op: replace
        path: /data/AI_RATE_LIMIT_MAX
        value: "30"
      # AI Gateway (#288) — enabled on preview (key in danify-api-secret)
      - op: add
        path: /data/AI_GATEWAY_ENABLED
        value: "true"
      - op: add
        path: /data/BANK_EMAIL_DOMAIN
        value: "danify.online"
      # Email service (Resend)
      - op: add
        path: /data/EMAIL_FROM
        value: "Danify PREVIEW <noreply@mail.danify.cz>"
      - op: add
        path: /data/EMAIL_APP_NAME
        value: "Danify PREVIEW"
      # Dev redirect on preview — emails go to martin@danify.cz to avoid spamming real users
      - op: add
        path: /data/EMAIL_DEV_REDIRECT
        value: "martin@danify.cz"
      # Sentry — gh#190 slice 5. SENTRY_DSN je v sealed secretu (danify-api-secret).
      # SENTRY_RELEASE mirrors dev SHA (preview image je retag z dev) — bude
      # dynamicky patchnut staging-deploy.yaml workflowem v gitops repu.
      - op: add
        path: /data/SENTRY_ENVIRONMENT
        value: "preview"
      - op: add
        path: /data/SENTRY_RELEASE
        value: "danify-api@dev"
